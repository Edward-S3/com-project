server {
    listen 80;
    server_name _; # IPアドレスでアクセスする場合の共通設定

    # --- ランチャーページ (/) ---
    root /var/www/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # --- 全アプリ共通のプロキシ設定 ---
    # WebSocket通信とヘッダー情報を正しく渡すための設定です
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # タイムアウト対策（Streamlit等が勝手に切断されるのを防ぐ）
    proxy_read_timeout 86400;

    # --- アプリ1 (8501番) /nk-faq/ ---
    location /nk-faq/ {
        proxy_pass http://172.16.16.10:8501/;
    }

    # --- アプリ2 (8502番) /rep-eva/ ---
    location /rep-eva/ {
        proxy_pass http://172.16.16.10:8502/;
    }

    # --- アプリ3 (8503番) /sby/ ---
    location /sby/ {
        proxy_pass http://172.16.16.10:8503/;
    }

    # --- exam (8505番) /exam/ — /opt/exam/exam_app.py (Streamlit) ---
    location /exam/ {
        proxy_pass http://172.16.16.10:8505/;
    }

    # --- Gemini Chat (8507番) /nai/ — /opt/gemini-ui/app.py (Streamlit) ---
    location /nai/ {
        client_max_body_size 500M;
        proxy_pass http://172.16.16.10:8507/;
    }

    # --- Gemini Chat 管理パネル (8508番) /nai-ctrl/ — /opt/gemini-ui/admin.py ---
    location /nai-ctrl/ {
        proxy_pass http://172.16.16.10:8508/;
    }

    # --- Gemini Chat v2 (8512番) /naiv2/ — /opt/gemini-ui2/app.py (Streamlit) ---
    location /naiv2/ {
        client_max_body_size 500M;
        proxy_pass http://172.16.16.10:8512/;
    }

    # --- Gemini Chat v2 管理パネル (8513番) /naiv2-ctrl/ — /opt/gemini-ui2/admin.py ---
    location /naiv2-ctrl/ {
        proxy_pass http://172.16.16.10:8513/;
    }

    # --- 音声合成ツール (8509番) /tts/ — /opt/tts/app.py (Streamlit) ---
    location /tts/ {
        proxy_pass http://172.16.16.10:8509/;
    }

    # --- メッセージ確認 (8511番) /mescheck/ — HTTP は HTTPS へリダイレクト（OAuth 必須） ---
    location /mescheck/ {
        return 301 https://$host/mescheck/;
    }

    # --- PPTX 自動生成 (8514番) /pptx/ — /opt/pptx-gen/app.py (Streamlit) ---
    location /pptx/ {
        client_max_body_size 50M;
        proxy_pass http://172.16.16.10:8514/;
    }

    # --- 画像PPTX変換 (8515番) /img2pptx/ — /opt/img2pptx/app.py (Streamlit) ---
    location /img2pptx/ {
        client_max_body_size 50M;
        proxy_pass http://172.16.16.10:8515/;
    }

    # --- PPTX 自動生成 Claude版 (8516番) /pptx-an/ — /opt/pptx-gen-an/app.py (Streamlit) ---
    location /pptx-an/ {
        client_max_body_size 50M;
        proxy_pass http://172.16.16.10:8516/;
    }

    # --- PPTX マルチLLM生成 (8517番) /pptx2/ — /opt/pptx-gen2/app.py (Streamlit) ---
    location /pptx2/ {
        client_max_body_size 50M;
        proxy_pass http://172.16.16.10:8517/;
    }

    # --- ランチャー用サーバー負荷 API (8510番) — 管理者認証必須 ---
    location /api/server-status/ {
        proxy_pass http://172.16.16.10:8510/api/server-status/;
    }
}
